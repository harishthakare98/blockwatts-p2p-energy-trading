<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - BlockWatts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'energy-green': '#10b981',
                        'energy-blue': '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full space-y-8 text-center">
        <div>
            <div class="mx-auto h-16 w-16 bg-gradient-to-r from-energy-green to-energy-blue rounded-full flex items-center justify-center mb-6">
                <i class="fas fa-check-circle text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900">
                Successfully Logged Out
            </h2>
            <p class="mt-2 text-gray-600">
                You have been safely logged out of BlockWatts
            </p>
        </div>
        
        <div class="space-y-4">
            <a href="{% url 'login' %}" 
               class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-gradient-to-r from-energy-green to-energy-blue hover:from-energy-green/90 hover:to-energy-blue/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-energy-blue transition-all duration-200">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Sign In Again
            </a>
            
            <a href="/" 
               class="w-full flex justify-center py-3 px-4 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-energy-blue transition-all duration-200">
                <i class="fas fa-home mr-2"></i>
                Go to Homepage
            </a>
        </div>
        
        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">
                &copy; 2025 BlockWatts - Renewable Energy Trading Platform
            </p>
        </div>
    </div>
</body>
</html>
